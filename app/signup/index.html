<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Animal Crossing</title>

    <link rel="stylesheet" href="../../style/base.css" />
    <link rel="stylesheet" href="../../style/components.css" />
    <link rel="stylesheet" href="../../style/layout.css" />
    <link rel="stylesheet" href="../../style/responsives.css" />
    <link rel="stylesheet" href="../../style/signup.css" />
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <div class="image-frame">
        <img
          width="240"
          height="240"
          src="https://img.icons8.com/color/240/animal-crossing.png"
          alt="animal-crossing"
        />
      </div>
      <div class="frame">
        <div class="logo">
          <img
            width="48"
            height="48"
            src="https://img.icons8.com/color/48/animal-crossing.png"
            alt="animal-crossing"
          />
          <span>Animal Crossing</span>
        </div>

        <form action="" class="sign-up-forms">
          <div class="sign-up-frame">
            <h1>Register</h1>
            <div class="input-container">
              <label for="username">Username</label>
              <input
                required
                type="text"
                id="username"
                placeholder="Enter username"
                minlength="6"
              />
              <label for="register">Email</label>
              <input
                required
                type="email"
                id="register"
                placeholder="Enter email"
              />
              <label for="password">Password</label>
              <input
                required
                type="password"
                id="password"
                placeholder="Enter password"
                minlength="6"
              />
            </div>

            <button type="submit" class="submit-button">Register</button>
          </div>
        </form>

        <div class="method">
          <span>Already have an account?</span>
          <a href="../../" class="link">Sign in now</a>
        </div>

        <div class="footer">
          <div class="logo-footer">
            <img
              width="32"
              height="32"
              src="https://img.icons8.com/color/48/animal-crossing.png"
              alt="animal-crossing"
            />
            <a href="#" class="link">@animalcrossing</a>
          </div>
          <footer
            style="
              font-family:
                &quot;Franklin Gothic Medium&quot;, &quot;Arial Narrow&quot;,
                Arial, sans-serif;
            "
          >
            &copy Animal Crossing 2026
          </footer>
        </div>
      </div>
    </div>
    <script src=""></script>
  </body>
</html>
